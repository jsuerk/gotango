<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoTango — Destination Hero Review</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --good: #3fb950;
      --warn: #d29922;
      --bad: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 17, 23, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    h1 { margin: 0 0 6px; font-size: 1.25rem; font-weight: 600; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }
    .toolbar input, .toolbar select, .toolbar button {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
    }
    .toolbar button {
      cursor: pointer;
      background: #21262d;
    }
    .toolbar button.primary { background: #238636; border-color: #2ea043; }
    .toolbar button:hover { border-color: var(--accent); }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-size: 0.9rem; }
    .stats span strong { color: var(--accent); }
    main { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .dest {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      margin-bottom: 18px;
      overflow: hidden;
    }
    .dest-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .dest-title { font-weight: 600; }
    .dest-meta { color: var(--muted); font-size: 0.85rem; }
    .badge {
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .badge.ok { color: var(--good); border-color: #238636; }
    .badge.pending { color: var(--warn); border-color: #9e6a03; }
    .badge.none { color: var(--muted); }
    .badge.flagged { color: var(--bad); border-color: #da3633; }
    .current {
      padding: 10px 16px;
      font-size: 0.85rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .candidates {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .card {
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #0d1117;
      display: flex;
      flex-direction: column;
    }
    .card.selected { border-color: var(--good); box-shadow: 0 0 0 1px var(--good); }
    .card img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #010409;
      display: block;
    }
    .card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .source { font-size: 0.8rem; color: var(--accent); }
    .alt { font-size: 0.85rem; color: var(--text); }
    .meta { font-size: 0.75rem; color: var(--muted); }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; }
    .card-actions button, .card-actions a {
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
    }
    .card-actions a:hover, .card-actions button:hover { border-color: var(--accent); }
    .empty { padding: 16px; color: var(--muted); font-size: 0.9rem; }
    .hidden { display: none !important; }
    footer {
      padding: 24px 20px 40px;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
    code { background: #21262d; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>

    <div class="stats" id="stats"></div>
  </header>

s-hero.jpg","alt":"Stunning view of El Arco rock formation, Cabo San Lucas, surrounded by the sea under a blue sky.","source":"Pexels","reviewed":false},"approvedCandidateId":null},{"id":"comporta","name":"Comporta (Lisbon area)","region":"Portugal","flagged":true,"candidates":[{"candidateId":"wikimedia-45308072","source":"Wikimedia Commons","previewUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Usina_Hidroel%C3%A9trica_Itaipu_Binacional_-_Itaipu_Dam_-_Foto_a%C3%A9rea_da_usina_com_o_vertedouro_aberto_-_Aerial_photo_of_the_powerplant_with_the_spillway_gates_opened_%2817359345042%29.jpg/1920px-thumbnail.jpg","downloadUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Usina_Hidroel%C3%A9trica_Itaipu_Binacional_-_Itaipu_Dam_-_Foto_a%C3%A9rea_da_usina_com_o_vertedouro_aberto_-_Aerial_photo_of_the_powerplant_with_the_spillway_gates_opened_%2817359345042%29.jpg/1920px-thumbnail.jpg","thumbnailUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Usina_Hidroel%C3%A9trica_Itaipu_Binacional_-_Itaipu_Dam_-_Foto_a%C3%A9rea_da_usina_com_o_vertedouro_aberto_-_Aerial_photo_of_the_powerplant_with_the_spillway_gates_opened_%2817359345042%29.jpg/1920px-thumbnail.jpg","alt":"Português A Usina Hidrelétrica de Itaipu (em espanhol: Itaipú, em guarani: Itaipu) é uma usina hidrelétrica binacional localizada no Rio Paraná, na fronteira entre o Brasil e o Paraguai. Construída por ambos os países no período de 1975 a 1982, no qual tanto o Brasil quanto o Paraguai eram governados por ditaduras militares, Itaipu é a segunda maior produtora de energia do mundo, perdendo o posto para a Barragem das Três Gargantas, que em 2014 produziu 98,8 MWh, contra 98,5 MWh de Itaipu. O nome Itaipu foi tirada de uma ilha que existia perto do local de construção. No idioma tupi-guarani, o termo significa \"pedra na qual a água faz barulho\", através da junção dos termos itá (pedra), 'y (água) e pu (barulho) . O seu lago possui uma área de 1 350 quilômetros quadrados, indo de Foz do Iguaçu, no Brasil e Ciudad del Este, no Paraguai, até Guaíra e Salto del Guairá, 150 quilômetros ao norte, além de suas vinte unidades geradoras de setecentos megawatts cada, Itaipu tem uma potência de geração de 14 000 megawatts. É um empreendimento binacional administrada por Brasil e Paraguai no rio Paraná na seção de fronteira entre os dois países, a 15 km ao norte da Ponte da Amizade. A capacidade instalada de geração da usina é de 14 GW, com 20 unidades geradoras fornecendo 700 MW cada e projeto hidráulico de 118 m. No ano de 2013, a usina quebrou o seu próprio recorde de produção de 2012, com 98.630.035 megawatts-hora (MWh). Em 1970, o consórcio formado pelas empresas PNC e ELC Electroconsult (da Itália) venceu a concorrência internacional para a realização dos estudos de viabilidade e para a elaboração do projeto da obra. O início do trabalho se deu em fevereiro de 1971. Em 26 de abril de 1973, Brasil e Paraguai assinaram o Tratado de Itaipu, instrumento legal para o aproveitamento hidrelétrico do Rio Paraná pelos dois países. Em 17 de maio de 1974, foi criada a entidade binacional Itaipu, para gerenciar a construção da usina. O início efetivo das obras ocorreu em janeiro do ano seguinte. Um consórcio de construtoras, liderado pela Mendes Júnior, executou o projeto. Para a construção, foram usados 40 000 trabalhadores diretos. Para o material, foram usados 12 570 000 metros cúbico de concreto (o equivalente a 210 estádios Jornalista Mário Filho e uma quantidade de ferro equivalente a 380 Torres Eiffel. Comparando a construção da hidrelétrica de Itaipu com o Eurotúnel (que liga França e Reino Unido sob o Canal da Mancha) foram utilizados 15 vezes mais concreto e o volume de escavações foi 8,5 vezes maior. Em uma operação denominada Mymba Kuera (que em guarani quer dizer \"pega-bicho\"), durante a formação do reservatório, equipes do setor ambiental de Itaipu esforçaram-se em percorrer a maior parte da área que seria alagada para salvar centenas de exemplares de espécies de animais da região. O reservatório da usina começou a ser formado em 12 de outubro de 1982, quando foram concluídas as obras da barragem e as comportas do canal de desvio foram fechadas. Nesse período, as águas subiram 100 metros e chegaram às comportas do vertedouro às 10 horas do dia 27 de outubro, devido às chuvas fortes e enchentes que ocorreram na época. Em 5 de maio de 1984, entrou em operação a primeira unidade geradora de Itaipu. As 20 unidades geradoras foram sendo instaladas ao ritmo de duas a três por ano. As duas últimas das 20 unidades de geração de energia elétrica começaram a funcionar entre setembro de 2006 e março 2007, elevando a capacidade instalada para 14.000 MW, concluindo a usina. Este aumento da capacidade permitiu que 18 unidades geradoras permaneçam funcionando o tempo todo, enquanto duas permanecem em manutenção.17 Devido a uma cláusula do tratado assinado entre Brasil, Paraguai e Argentina, o número máximo de unidades geradoras autorizadas a operar simultaneamente não pode ultrapassar 18 (veja a seção de acordo para mais informações). A potência nominal de cada unidade geradora (turbina e gerador) é de 700 MW. No entanto, porque diferença entre o nível do reservatório e o nível do rio ao pé da barragem que ocorre realmente é maior do que a projetada, a energia disponível for superior a 750 MW por meia hora para cada gerador. Cada turbina gera cerca de 700 megawatts, para comparação, toda a água das Cataratas do Iguaçu teria capacidade para alimentar somente dois geradores. A Itaipu produz uma média de 90 milhões de megawatts-hora (MWh) por ano. Com o aumento da capacidade e em condições favoráveis do rio Paraná (chuvas em níveis normais em toda a bacia) a geração poderá chegar a 100 milhões de MWh. O atual diretor é Jorge Miguel Samek. Fonte: Wikipedia English The Itaipu Dam (Guarani: Presa Itaipu, Portuguese: Barragem de Itaipu, Spanish: Represa de Itaipú; Portuguese pronunciation: [itɐjˈpu], locally: [ita.iˈpu], Spanish pronunciation: [itaiˈpu]) is a hydroelectric dam on the Paraná River located on the border between Brazil and Paraguay. The name \"Itaipu\" was taken from an isle that existed near the construction site. In the Guarani language, Itaipu means \"the sounding stone\". The dam is the second largest operating hydroelectric facility in terms of annual energy generation, generating 98.6 in 2013 and 87.8 TWh in 2014, while the annual energy generation of the Three Gorges Dam was 83.7 TWh in 2013 and 98.8 TWh in 2014. It is a binational undertaking run by Brazil and Paraguay at the Paraná River on the border section between the two countries, 15 km (9.3 mi) north of the Friendship Bridge. The project ranges from Foz do Iguaçu, in Brazil, and Ciudad del Este in Paraguay, in the south to Guaíra and Salto del Guairá in the north. The installed generation capacity of the plant is 14 GW, with 20 generating units providing 700 MW each with a hydraulic design head of 118 m. In 2013 the plant generated a record 98.6 TWh, supplying approximately 75% of the electricity consumed by Paraguay and 17% of that consumed by Brazil. Of the twenty generator units currently installed, ten generate at 50 Hz for Paraguay and ten generate at 60 Hz for Brazil. Since the output capacity of the Paraguayan generators far exceeds the load in Paraguay, most of their production is exported directly to the Brazilian side, from where two 600 kV HVDC lines, each approximately 800 km long, carry the majority of the energy to the São Paulo/Rio de Janeiro region where the terminal equipment converts the power to 60 Hz. In 1970, the consortium formed by the companies IECO (from the United States), and ELC Electroconsult S.p.A. (from Italy) won the international competition for the realization of the viability studies and for the elaboration of the construction project. Design studies began in February 1971. On April 26, 1973, Brazil and Paraguay signed the Itaipu Treaty, the legal instrument for the hydroelectric exploitation of the Paraná River by the two countries. On May 17, 1974, the Itaipu Binacional entity was created to administer the plant's construction. The construction began in January of the following year. Brazil's (and Latin America's) first electric car was introduced in late 1974; it received the name Itaipu in honor of the project. The reservoir began its formation on October 13, 1982, when the dam works were completed and the side canal's gates were closed. Throughout this period, heavy rains and flooding accelerated the filling of the reservoir as the water rose 100 meters (330 feet) and reached the gates of the spillway at 10 a.m. on October 27. On May 5, 1984, the first generation unit started running in Itaipu. The first 18 units were installed at the rate of two to three a year; the last two of these started running in the year 1991.","credit":"Deni Williams from São Paulo, Brasil","sourceUrl":"https://commons.wikimedia.org/wiki/File%3AUsina%20Hidroel%C3%A9trica%20Itaipu%20Binacional%20-%20Itaipu%20Dam%20-%20Foto%20a%C3%A9rea%20da%20usina%20com%20o%20vertedouro%20aberto%20-%20Aerial%20photo%20of%20the%20powerplant%20with%20the%20spillway%20gates%20opened%20(17359345042).jpg","license":"CC BY 2.0","width":4912,"height":3264,"mime":"image/jpeg","wikimediaFile":"Usina Hidroelétrica Itaipu Binacional - Itaipu Dam - Foto aérea da usina com o vertedouro aberto - Aerial photo of the powerplant with the spillway gates opened (17359345042).jpg","title":"File:Usina Hidroelétrica Itaipu Binacional - Itaipu Dam - Foto aérea da usina com o vertedouro aberto - Aerial photo of the powerplant with the spillway gates opened (17359345042).jpg","description":"Português A Usina Hidrelétrica de Itaipu (em espanhol: Itaipú, em guarani: Itaipu) é uma usina hidrelétrica binacional localizada no Rio Paraná, na fronteira entre o Brasil e o Paraguai. Construída por ambos os países no período de 1975 a 1982, no qual tanto o Brasil quanto o Paraguai eram governados por mentar somente dois geradores. A Itaipu produz uma média de 90 milhões de megawatts-hora (MWh) por ano. Com o aumento da capacidade e em condições favoráveis do rio Paraná (chuvas em níveis normais em toda a bacia) a geração poderá chegar a 100 milhões de MWh. O atual diretor é Jorge Miguel Samek. Fonte: Wikipedia English The Itaipu Dam (Guarani: Presa Itaipu, Portuguese: Barragem de Itaipu, Spanish: Represa de Itaipú; Portuguese pronunciation: [itɐjˈpu], locally: [ita.iˈpu], Spanish pronunciation: [itaiˈpu]) is a hydroelectric dam on the Paraná River located on the border between Brazil and Paraguay. The name \"Itaipu\" was taken from an isle that existed near the construction site. In the Guarani language, Itaipu means \"the sounding stone\". The dam is the second largest operating hydroelectric facility in terms of annual energy generation, generating 98.6 in 2013 and 87.8 TWh in 2014, while the annual energy generation of the Three Gorges Dam was 83.7 TWh in 2013 and 98.8 TWh in 2014. It is a binational undertaking run by Brazil and Paraguay at the Paraná River on the border section between the two countries, 15 km (9.3 mi) north of the Friendship Bridge. The project ranges from Foz do Iguaçu, in Brazil, and Ciudad del Este in Paraguay, in the south to Guaíra and Salto del Guairá in the north. The installed generation capacity of the plant is 14 GW, with 20 generating units providing 700 MW each with a hydraulic design head of 118 m. In 2013 the plant generated a record 98.6 TWh, supplying approximately 75% of the electricity consumed by Paraguay and 17% of that consumed by Brazil. Of the twenty generator units currently installed, ten generate at 50 Hz for Paraguay and ten generate at 60 Hz for Brazil. Since the output capacity of the Paraguayan generators far exceeds the load in Paraguay, most of their production is exported directly to the Brazilian side, from where two 600 kV HVDC lines, each approximately 800 km long, carry the majority of the energy to the     const STORAGE_KEY = 'gotango-hero-review-selections-v1';
    let selections = loadSelections();

    function loadSelections() {
      const fromFile = DATA.destinations.reduce((acc, d) => {
        if (d.approvedCandidateId) acc[d.id] = d.approvedCandidateId;
        return acc;
      }, {});
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        return { ...fromFile, ...saved };
      } catch {
        return fromFile;
      }
    }

    function saveSelections() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(selections));
      render();
    }

    function candidateById(dest, candidateId) {
      return (dest.candidates || []).find((c) => c.candidateId === candidateId);
    }

    function isApproved(dest) {
      const id = selections[dest.id];
      return !!id && !!candidateById(dest, id);
    }

    function matchesFilter(dest) {
      const q = document.getElementById('search').value.trim().toLowerCase();
      if (q && !dest.id.includes(q) && !dest.name.toLowerCase().includes(q) && !(dest.region || '').toLowerCase().includes(q)) {
        return false;
      }
      const filter = document.getElementById('filter').value;
      if (filter === 'needs-review') return dest.candidates.length && !isApproved(dest);
      if (filter === 'flagged') return dest.flagged;
      if (filter === 'approved') return isApproved(dest);
      if (filter === 'no-candidates') return !dest.candidates.length;
      return true;
    }

    function renderStats() {
      const total = DATA.destinations.length;
      const withCandidates = DATA.destinations.filter((d) => d.candidates.length).length;
      const approved = DATA.destinations.filter((d) => isApproved(d)).length;
      document.getElementById('stats').innerHTML = [
        '<span><strong>' + approved + '</strong> / ' + total + ' approved</span>',
        '<span><strong>' + withCandidates + '</strong> with candidates</span>',
        '<span><strong>' + DATA.destinations.filter((d) => d.flagged).length + '</strong> flagged</span>',
      ].join('');
    }

    function renderCard(dest, candidate) {
      const selected = selections[dest.id] === candidate.candidateId;
      const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
      return '<article class="card' + (selected ? ' selected' : '') + '" data-dest="' + esc(dest.id) + '" data-candidate="' + esc(candidate.candidateId) + '">' +
        '<img src="' + esc(candidate.previewUrl || candidate.thumbnailUrl) + '" alt="' + esc(candidate.alt) + '" loading="lazy" />' +
        '<div class="card-body">' +
          '<div class="source">' + esc(candidate.source) + ' · score ' + esc(candidate.score) + '</div>' +
          '<div class="alt">' + esc(candidate.alt) + '</div>' +
          '<div class="meta">Query: ' + esc(candidate.queryUsed) + '<br/>License: ' + esc(candidate.license) + '</div>' +
          '<div class="card-actions">' +
            '<button type="button" data-action="select">Select</button>' +
            '<a href="' + esc(candidate.sourceUrl) + '" target="_blank" rel="noopener">Source</a>' +
          '</div>' +
        '</div>' +
      '</article>';
    }

    function renderDestination(dest) {
      const approved = isApproved(dest);
      const badges = [];
      if (dest.flagged) badges.push('<span class="badge flagged">flagged</span>');
      if (approved) badges.push('<span class="badge ok">approved</span>');
      else if (dest.candidates.length) badges.push('<span class="badge pending">needs review</span>');
      else badges.push('<span class="badge none">no candidates</span>');

      const current = dest.currentHero
        ? '<div class="current">Current manifest: <strong>' + esc(dest.currentHero.source) + '</strong> — ' + esc(dest.currentHero.alt) +
          (dest.currentHero.reviewed ? ' (reviewed)' : ' (unreviewed)') + '</div>'
        : '<div class="current">No manifest entry yet.</div>';

      const cards = dest.candidates.length
        ? '<div class="candidates">' + dest.candidates.map((c) => renderCard(dest, c)).join('') + '</div>'
        : '<div class="empty">Run fetch scripts with <code>--candidates</code> to populate options.</div>';

      return '<section class="dest" data-dest="' + esc(dest.id) + '">' +
        '<div class="dest-head">' +
          '<div><div class="dest-title">' + esc(dest.name) + '</div><div class="dest-meta">' + esc(dest.id) + ' · ' + esc(dest.region) + '</div></div>' +
          '<div>' + badges.join(' ') + '</div>' +
        '</div>' +
        current +
        cards +
      '</section>';
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    }

    function render() {
      const list = document.getElementById('list');
      const items = DATA.destinations.filter(matchesFilter).map(renderDestination);
      list.innerHTML = items.join('') || '<p class="empty">No destinations match this filter.</p>';
      renderStats();
    }

    function exportApprovals() {
      const out = {
        version: 1,
        updatedAt: new Date().toISOString(),
        selections: {},
      };
      for (const dest of DATA.destinations) {
        const candidateId = selections[dest.id];
        const candidate = candidateById(dest, candidateId);
        if (!candidate) continue;
        out.selections[dest.id] = {
          destinationId: dest.id,
          destinationName: dest.name,
          candidateId: candidate.candidateId,
          approvedAt: new Date().toISOString(),
          candidate,
        };
      }
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'destination-hero-selections-approved.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('list').addEventListener('click', (event) => {
      const card = event.target.closest('.card');
      if (!card) return;
      const action = event.target.closest('[data-action="select"]');
      if (!action) return;
      selections[card.dataset.dest] = card.dataset.candidate;
      saveSelections();
    });

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filter').addEventListener('change', render);
    document.getElementById('exportBtn').addEventListener('click', exportApprovals);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      const data = JSON.parse(text);
      for (const [destId, row] of Object.entries(data.selections || {})) {
        selections[destId] = row.candidateId || row.candidate?.candidateId;
      }
      saveSelections();
      event.target.value = '';
    });

    render();
  </script>
</body>
</html>
