<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Go Tango  Where the world's going">
  <defs>
    <linearGradient id="amber-v2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B52A"/>
      <stop offset="50%" stop-color="#E8A317"/>
      <stop offset="100%" stop-color="#C28A1A"/>
    </linearGradient>
    <radialGradient id="glow-tr" cx="82%" cy="12%" r="52%">
      <stop offset="0%" stop-color="#E8A317" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E8A317" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bl" cx="12%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#5EAAA8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#5EAAA8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F5F1E8" stroke-width="1" opacity="0.02"/>
    </pattern>
    <mask id="grid-mask">
      <radialGradient id="grid-fade" cx="78%" cy="28%" r="58%">
        <stop offset="0%" stop-color="#fff"/>
        <stop offset="72%" stop-color="#fff" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#000"/>
      </radialGradient>
      <rect width="1200" height="630" fill="url(#grid-fade)"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="#0A0D11"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-mask)"/>
  <rect width="1200" height="630" fill="url(#glow-tr)"/>
  <rect width="1200" height="630" fill="url(#glow-bl)"/>
  <text x="538" y="252" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="152" font-weight="700" font-style="italic" fill="url(#amber-v2)" letter-spacing="-0.02em">G</text>
  <text x="598" y="252" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="152" font-weight="700" font-style="italic" fill="url(#amber-v2)" letter-spacing="-0.05em">T</text>
  <text x="600" y="342" text-anchor="middle" font-family="'Geist', system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="50" font-weight="500" fill="#A8A293" letter-spacing="0.12em">GO TANGO</text>
  <text x="600" y="416" text-anchor="middle" font-family="'Fraunces', Georgia, 'Times New Roman', serif" font-size="36" font-weight="400" font-style="italic" fill="#F5F1E8">Where the world&#8217;s going.</text>
  <text x="600" y="472" text-anchor="middle" font-family="'Geist', system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="21" font-weight="400" fill="#6B6557" letter-spacing="0.02em">Travel intelligence without the fluff.</text>
</svg>
